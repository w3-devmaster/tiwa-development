name: tiwa-dev

services:
  postgres:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-tiwa}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-tiwa_dev_password}
      POSTGRES_DB: ${POSTGRES_DB:-tiwa}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-tiwa}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - tiwa-net

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --appendonly yes
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - tiwa-net

  mongodb:
    image: mongo:7
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_USER:-tiwa}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASSWORD:-tiwa_dev_password}
      MONGO_INITDB_DATABASE: ${MONGO_DB:-tiwa}
    ports:
      - "${MONGO_PORT:-27017}:27017"
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - tiwa-net

volumes:
  postgres_data:
  redis_data:
  mongo_data:

networks:
  tiwa-net:
    driver: bridge
